<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Assessment & Food Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8faff;
            --card-bg: #ffffff;
            --primary-text: #1a1c2e;
            --secondary-text: #64748b;
            --accent-color: #6366f1; /* Indigo light shade */
            --accent-light: #e0e7ff;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            --border-radius: 16px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--accent-color);
        }

        .impact-score-banner {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            padding: 30px;
            border-radius: var(--border-radius);
            text-align: center;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .impact-score-banner h2 {
            margin: 0;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .score-value {
            font-size: 4rem;
            font-weight: 600;
            margin: 10px 0;
        }

        /* 3 Cards in a Row Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .metric-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--accent-light);
            text-align: center;
            transition: transform 0.2s ease;
        }

        .metric-card:hover {
            transform: translateY(-5px);
        }

        .metric-card h3 {
            font-size: 0.9rem;
            color: var(--secondary-text);
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent-color);
        }

        /* Recommendations Section */
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent-color);
            padding-left: 15px;
        }

        .recommendation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .food-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--accent-light);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .food-icon {
            font-size: 2.5rem;
            background: var(--accent-light);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .food-info h4 {
            margin: 0;
            font-size: 1.1rem;
        }

        .food-info p {
            margin: 5px 0 0 0;
            color: var(--secondary-text);
            font-size: 0.9rem;
        }

        .category-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 8px;
            background-color: var(--accent-light);
            color: var(--accent-color);
        }

        @media (max-width: 768px) {
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .metrics-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Body Health Report</h1>
            <p id="dateLabel">Analysis for Today</p>
        </header>

        <div class="impact-score-banner">
            <h2>Holistic Body Impact Score</h2>
            <div class="score-value" id="impactScore">--</div>
            <p id="statusMsg">Analyzing your current data...</p>
        </div>

        <h3 class="section-title">Metabolic Averages</h3>
        <div class="metrics-grid">
            <div class="metric-card">
                <h3>Heart Rate</h3>
                <div class="metric-value" id="avgHR">-- <small>BPM</small></div>
            </div>
            <div class="metric-card">
                <h3>HRV Index</h3>
                <div class="metric-value" id="avgHRV">--</div>
            </div>
            <div class="metric-card">
                <h3>Skin Temp</h3>
                <div class="metric-value" id="avgTemp">-- <small>°C</small></div>
            </div>
            <div class="metric-card">
                <h3>B/A Ratio</h3>
                <div class="metric-value" id="avgBA">--</div>
            </div>
            <div class="metric-card">
                <h3>Hydration</h3>
                <div class="metric-value" id="avgHydration">-- <small>%</small></div>
            </div>
            <div class="metric-card">
                <h3>Heat Factor</h3>
                <div class="metric-value" id="avgHeat">--</div>
            </div>
        </div>

        <h3 class="section-title">Recommended Meals</h3>
        <div class="recommendation-grid" id="foodRecommendations">
            <!-- Dynamically injected -->
        </div>
    </div>

    <script>
        // In a real scenario, this would fetch from the API
        // For demonstration, we'll expose a function to update the UI
        function updateReport(data) {
            document.getElementById('impactScore').innerText = data.predicted_score;
            document.getElementById('statusMsg').innerText = data.status || "Your body is in a stable state.";
            
            document.getElementById('avgHR').innerHTML = `${data.averages.heart_rate} <small>BPM</small>`;
            document.getElementById('avgHRV').innerText = data.averages.hrv;
            document.getElementById('avgTemp').innerHTML = `${data.averages.temperature} <small>°C</small>`;
            document.getElementById('avgBA').innerText = data.averages.ba_ratio;
            document.getElementById('avgHydration').innerHTML = `${data.averages.hydration_level} <small>%</small>`;
            document.getElementById('avgHeat').innerText = data.averages.heat_factor;

            const foodContainer = document.getElementById('foodRecommendations');
            foodContainer.innerHTML = '';
            
            data.recommendations.forEach(food => {
                const card = document.createElement('div');
                card.className = 'food-card';
                card.innerHTML = `
                    <div class="food-icon">🥗</div>
                    <div class="food-info">
                        <h4>${food.name}</h4>
                        <p>Optimized for current state</p>
                        <span class="category-tag">${food.category} Impact</span>
                    </div>
                `;
                foodContainer.appendChild(card);
            });
        }

        // Auto-fetch example or receive from parent if in WebView
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'UPDATE_REPORT') {
                updateReport(event.data.payload);
            }
        });
    </script>
</body>
</html>
